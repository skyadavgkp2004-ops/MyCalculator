<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <h1 id="head">
  Welcome to My Calculator
</h1>
<div class="calculator">
    <div>
        <input type="text" id="inputBox" placeholder="0 ">
     <div>
        <button >AC</button>
        <button >DEL</button>
        <button >%</button>
        <button >/</button>
    </div>
    <div>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>*</button>  
  </div>
    <div>
         <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>
    </div>
    <div>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>
    </div>
    <div>
       <button>0</button>
        <button>.</button>
        <button>00</button>
        <button class="btn">=</button>
    </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
